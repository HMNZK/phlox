name: Deploy site to GitHub Pages

# phlox.cc は site/ ディレクトリの静的サイトを GitHub Pages（Actions 方式）で配信する。
# legacy（ブランチ）方式はソースが / か /docs のみでサブフォルダを配信できないため、
# Actions で site/ をアーティファクトとして deploy する。main への push で自動反映。

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時デプロイを1本に直列化（進行中があればキャンセルせず待つ）。
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site/ artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
